---
deploy_user: app

redmine_domain: opsinfrapath.ru
redmine_port: 3000
redmine_dir: /opt/redmine
redmine_network: redmine

redmine_db_container: redmine-postgres
redmine_db_host: "{{ redmine_db_container }}"
redmine_db_port: 5432
redmine_db_name: redmine
redmine_db_user: redmine

letsencrypt_webroot: /var/www/letsencrypt

redmine_backends:
  - name: redmine-1
    port: 3001
  - name: redmine-2
    port: 3002

datadog_site: datadoghq.eu
datadog_env: prod
datadog_swap_file: /swapfile
datadog_swap_size_mb: 2048
datadog_config:
  env: "{{ datadog_env }}"
  tags:
    - env:{{ datadog_env }}
    - service:redmine
datadog_checks:
  http_check:
    init_config:
    instances:
      - name: redmine
        url: "https://{{ redmine_domain }}/"
        timeout: 5
        method: GET
        http_response_status_code: "200"
        content_match: Redmine
        collect_response_time: true
        tls_verify: true
        tags:
          - env:{{ datadog_env }}
          - service:redmine
